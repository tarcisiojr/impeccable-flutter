name: impeccable_flutter_lints
description: >-
  Plugin custom_lint que detecta anti-padrões de design em apps Flutter.
  34 regras: AI slop (gradient, deepPurple) e quality (Semantics, contrast).
version: 0.1.3
homepage: https://impeccable.style
repository: https://github.com/tarcisiojr/impeccable-flutter/tree/main/lints
issue_tracker: https://github.com/tarcisiojr/impeccable-flutter/issues
documentation: https://impeccable.style/flutter
topics:
  - lints
  - design
  - analyzer
  - flutter
  - custom-lint

environment:
  sdk: ^3.5.0

dependencies:
  analyzer: ^7.0.0
  analyzer_plugin: ^0.13.0
  custom_lint_builder: ^0.7.0

dev_dependencies:
  custom_lint: ^0.7.0
  test: ^1.25.0
  lints: ^5.0.0
