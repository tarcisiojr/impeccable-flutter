# CI da port Flutter (branch flutter-port).
#
# Roda em paralelo:
#   - skill build (Node.js)
#   - lints package (dart test integration, requer Flutter SDK)
#   - cli_dart package (dart test unit)
#
# Quando a port virar default (merge de flutter-port para main), trocar
# o branch filter para incluir main.

name: flutter-port-ci

on:
  push:
    branches: [flutter-port]
  pull_request:
    branches: [flutter-port, main]

jobs:
  skill-build:
    name: Skill build (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: node scripts/build.js
      - run: bun test

  cli-dart-test:
    name: CLI Dart unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
        working-directory: cli_dart
      - run: dart analyze
        working-directory: cli_dart
      - run: dart test
        working-directory: cli_dart

  lints-integration-test:
    name: Lints integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      # Resolve deps do package raiz e do example.
      - run: dart pub get
        working-directory: lints
      - run: flutter pub get
        working-directory: lints/example
      - run: dart analyze
        working-directory: lints
      # Roda as 25 integration tests (boota custom_lint contra example/).
      - run: dart test
        working-directory: lints
        timeout-minutes: 5
