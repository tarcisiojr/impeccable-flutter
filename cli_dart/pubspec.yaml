name: impeccable_flutter
description: >-
  CLI Dart para detectar anti-padrões de design em apps Flutter. Modo --fast
  faz scan regex (incluindo 2 checks cross-file: monotonous spacing,
  everything centered). Subcomando `skills install/update/check` instala o
  skill impeccable-flutter (Claude Code, Cursor, Codex e 8 outros harnesses)
  no projeto atual. Para checks AST inline use o pacote irmão
  impeccable_flutter_lints via custom_lint.
version: 0.1.1
homepage: https://impeccable.style/flutter
repository: https://github.com/tarcisiojr/impeccable-flutter
issue_tracker: https://github.com/tarcisiojr/impeccable-flutter/issues
documentation: https://impeccable.style/flutter
topics:
  - lints
  - design
  - flutter
  - cli

environment:
  sdk: ^3.5.0

executables:
  impeccable_flutter: impeccable_flutter

dependencies:
  args: ^2.6.0
  path: ^1.9.0
  io: ^1.0.5

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
