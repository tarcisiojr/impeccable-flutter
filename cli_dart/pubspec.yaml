name: impeccable_flutter
description: >-
  CLI Dart para detectar anti-padrões de design em apps Flutter.
  Modo --fast (regex), full (custom_lint) e subcomando skills install.
version: 0.1.4
homepage: https://impeccable.style/flutter
repository: https://github.com/tarcisiojr/impeccable-flutter/tree/main/cli_dart
issue_tracker: https://github.com/tarcisiojr/impeccable-flutter/issues
documentation: https://impeccable.style/flutter
topics:
  - lints
  - design
  - flutter
  - cli

environment:
  sdk: ^3.5.0

executables:
  impeccable_flutter: impeccable_flutter

dependencies:
  args: ^2.6.0
  path: ^1.9.0
  io: ^1.0.5

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
